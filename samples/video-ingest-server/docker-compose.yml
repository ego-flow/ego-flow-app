services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: video-ingest-mediamtx
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8888:8888"
      - "9996:9996"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ./recordings:/recordings

  viewer:
    image: nginx:alpine
    container_name: video-ingest-viewer
    restart: unless-stopped
    depends_on:
      - mediamtx
    ports:
      - "8088:80"
    volumes:
      - ./viewer:/usr/share/nginx/html:ro
