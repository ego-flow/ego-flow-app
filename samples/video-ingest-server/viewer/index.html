<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video Ingest Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --panel: #161b22;
        --muted: #8b949e;
        --text: #e6edf3;
        --accent: #2f81f7;
        --border: #30363d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: radial-gradient(circle at top, #182033, var(--bg) 60%);
        color: var(--text);
        font: 16px/1.5 "Segoe UI", sans-serif;
      }

      main {
        width: min(960px, calc(100vw - 32px));
        margin: 32px auto;
      }

      .panel {
        background: color-mix(in srgb, var(--panel) 92%, black);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        margin-bottom: 16px;
      }

      input,
      button {
        border-radius: 10px;
        border: 1px solid var(--border);
        font: inherit;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        background: #0f1724;
        color: var(--text);
      }

      button {
        padding: 12px 16px;
        background: var(--accent);
        color: white;
        cursor: pointer;
      }

      video {
        width: 100%;
        border-radius: 12px;
        background: black;
        aspect-ratio: 16 / 9;
      }

      .status {
        margin-top: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      code {
        color: #9ecbff;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>Video Ingest Viewer</h1>
        <p>Default stream path is <code>live/glasses</code>.</p>
        <div class="controls">
          <input id="stream-url" type="text" />
          <button id="load-button" type="button">Load Stream</button>
        </div>
        <video id="player" controls autoplay muted playsinline></video>
        <div class="status" id="status"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
      const player = document.getElementById("player");
      const statusEl = document.getElementById("status");
      const input = document.getElementById("stream-url");
      const button = document.getElementById("load-button");

      const defaultUrl = `http://${window.location.hostname}:8888/live/glasses/index.m3u8`;
      input.value = defaultUrl;

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function loadStream(url) {
        if (window.Hls && Hls.isSupported()) {
          const hls = new Hls({
            lowLatencyMode: true,
            backBufferLength: 30,
          });
          hls.loadSource(url);
          hls.attachMedia(player);
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            setStatus(`Playing ${url}`);
            player.play().catch(() => {});
          });
          hls.on(Hls.Events.ERROR, (_, data) => {
            setStatus(`HLS error: ${data.type} / ${data.details}`);
          });
          return;
        }

        if (player.canPlayType("application/vnd.apple.mpegurl")) {
          player.src = url;
          player.addEventListener(
            "loadedmetadata",
            () => {
              setStatus(`Playing ${url}`);
              player.play().catch(() => {});
            },
            { once: true }
          );
          return;
        }

        setStatus("This browser does not support HLS playback.");
      }

      button.addEventListener("click", () => loadStream(input.value.trim()));
      loadStream(defaultUrl);
    </script>
  </body>
</html>
